name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  # Warning-zero policy: any rustc warning in this repo is a regression.
  RUSTFLAGS: "-D warnings"

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # All members incl. the non-default misarta-py (pyo3; check does
      # not link, so no Python shared library is needed).
      - name: Check (workspace, all targets, all features)
        run: cargo check --workspace --all-targets --all-features
      # Default members only: misarta + misarta-formats. misarta-py is
      # excluded — linking a pyo3 extension-module test binary fails by
      # design; its pytest suite runs via maturin locally.
      - name: Test
        run: cargo test

  # Coverage of the default members (misarta + misarta-formats) via
  # cargo-llvm-cov; uploaded to Codecov over OIDC (no token secret).
  coverage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Measure coverage
        run: cargo llvm-cov --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
